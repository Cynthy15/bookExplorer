<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Categories - Book Explorer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-green-200 text-gray-800 flex flex-col min-h-screen">

<nav class=" bg-green-800 text-white shadow-md">
  <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">

    <!-- Logo -->
    <a href="index.html" class="flex items-center space-x-2">
      <img src="logo.png" alt="Logo" class="h-10 w-auto">
    </a>

    <!-- Desktop Menu -->
    <ul class="hidden md:flex space-x-6 font-medium">
      <li><a href="index.html" class="hover:text-yellow-300">Home</a></li>
      <li><a href="browse.html" class="hover:text-yellow-300">Browse</a></li>
      <li><a href="categories.html" class="hover:text-yellow-300">Categories</a></li>
      <li><a href="fav.html" class="hover:text-yellow-300">Favorites</a></li>
    </ul>

    <button id="menuBtn" class="md:hidden text-3xl focus:outline-none"> ☰ </button>

  </div>

  <!-- Mobile Menu -->
  <div id="mobileMenu" class="hidden md:hidden bg-green-700">
    <ul class="flex flex-col space-y-4 p-4 font-medium">
      <li><a href="index.html" class="block hover:text-yellow-300">Home</a></li>
      <li><a href="browse.html" class="block hover:text-yellow-300">Browse</a></li>
      <li><a href="categories.html" class="block hover:text-yellow-300">Categories</a></li>
      <li><a href="fav.html" class="block hover:text-yellow-300">Favorites</a></li>
    </ul>
  </div>
</nav>

<main class="flex-grow">
<section class="max-w-7xl mx-auto px-4 py-10">

  <h2 class="text-3xl font-bold mb-8 text-center text-green-800">
    Book Categories
  </h2>

  <!-- Categories Row -->
  <div id="categoryList" class="flex flex-wrap justify-center gap-4 mb-12">

    <button class="category-btn bg-green-200 text-green-900 px-6 py-3 rounded-lg hover:bg-green-300 transition"> Fiction </button>

    <button class="category-btn bg-green-200 text-green-900 px-6 py-3 rounded-lg hover:bg-green-300 transition"> Romance </button>

    <button class="category-btn bg-green-200 text-green-900 px-6 py-3 rounded-lg hover:bg-green-300 transition"> Science </button>

    <button class="category-btn bg-green-200 text-green-900 px-6 py-3 rounded-lg hover:bg-green-300 transition"> Self Development </button>

    <button class="category-btn bg-green-200 text-green-900 px-6 py-3 rounded-lg hover:bg-green-300 transition"> Fantasy </button>

    <button class="category-btn bg-green-200 text-green-900 px-6 py-3 rounded-lg hover:bg-green-300 transition"> History </button>

  </div>

  <!-- Books Grid -->
  <div id="categoryBooks" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6"> </div>

</section>
</main>

<script type="module" src="scripts/categories.js"></script>

<footer class="bg-green-900 text-white py-6 text-center">
  <p>BY CYNTHY</p>
  <p>&copy; 2026 Book Explorer</p>
</footer>

<script>
  const menuBtn = document.getElementById("menuBtn");
  const mobileMenu = document.getElementById("mobileMenu");

  menuBtn.addEventListener("click", () => {
    mobileMenu.classList.toggle("hidden");
  });
</script>

</body>
</html>
