<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Browse - Book Explorer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-green-50 text-gray-800 flex flex-col min-h-screen">

<nav class=" bg-green-800 text-white shadow-md">
  <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">

    <!-- Logo -->
    <a href="index.html">
      <h1 class="text-2xl font-bold">Book Explorer</h1>
    </a>

    <!-- Desktop Menu -->
    <ul class="hidden md:flex space-x-6 font-medium">
      <li><a href="index.html" class="hover:text-yellow-300">Home</a></li>
      <li><a href="browse.html" class="hover:text-yellow-300">Browse</a></li>
      <li><a href="categories.html" class="hover:text-yellow-300">Categories</a></li>
      <li><a href="fav.html" class="hover:text-yellow-300">Favorites</a></li>
    </ul>

    <button id="menuBtn" class="md:hidden text-3xl focus:outline-none"> ☰ </button>

  </div>

  <!-- Mobile Menu -->
  <div id="mobileMenu" class="hidden md:hidden bg-green-700">
    <ul class="flex flex-col space-y-4 p-4 font-medium">
      <li><a href="index.html" class="block hover:text-yellow-300">Home</a></li>
      <li><a href="browse.html" class="block hover:text-yellow-300">Browse</a></li>
      <li><a href="categories.html" class="block hover:text-yellow-300">Categories</a></li>
      <li><a href="fav.html" class="block hover:text-yellow-300">Favorites</a></li>
    </ul>
  </div>
</nav>

<main class="flex-grow">
<section class="max-w-7xl mx-auto px-4 py-10">

  <h2 class="text-3xl font-bold mb-6 text-center text-green-800"> Browse All Books </h2>

  <!-- Search Bar -->
  <div class="mb-8 flex justify-center gap-2">
    <input type="text" id="searchInput" placeholder="Search books by title or author..." class="w-full sm:w-1/2 px-4 py-3 border border-green-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-600">

    <button id="searchBtn" class="bg-green-600 text-white px-6 py-3 rounded-lg hover:bg-green-700 transition"> Search </button>

  </div>

  <!-- Book Grid -->
  <div id="bookGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6"></div>

</section>
</main>

<footer class="bg-green-900 text-white py-6 text-center">
  <p>BY CYNTHY</p>
  <p>&copy; 2026 Book Explorer</p>
</footer>

<script>
  const menuBtn = document.getElementById("menuBtn");
  const mobileMenu = document.getElementById("mobileMenu");

  menuBtn.addEventListener("click", () => {
    mobileMenu.classList.toggle("hidden");
  });
</script>

<script type="module" src="scripts/browse.js"></script>

</body>
</html>
