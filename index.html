<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Book Explorer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-green-200 text-gray-800 flex flex-col min-h-screen">

<!-- Navbar -->
<nav class=" bg-green-800 text-white shadow-md">
  <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">

    <!-- Logo -->
<a href="index.html" class="flex items-center space-x-2">
  <img src="logo.png" alt="Logo" class="h-10 w-auto">
</a>

    <!-- Desktop Menu -->
    <ul class="hidden md:flex space-x-6 font-medium">
      <li><a href="index.html" class="hover:text-yellow-300">Home</a></li>
      <li><a href="browse.html" class="hover:text-yellow-300">Browse</a></li>
      <li><a href="categories.html" class="hover:text-yellow-300">Categories</a></li>
      <li><a href="fav.html" class="hover:text-yellow-300">Favorites</a></li>
    </ul>

    <button id="menuBtn" class="md:hidden text-3xl focus:outline-none"> ☰ </button>

  </div>

  <!-- Mobile Menu -->
  <div id="mobileMenu" class="hidden md:hidden bg-green-700">
    <ul class="flex flex-col space-y-4 p-4 font-medium">
      <li><a href="index.html" class="block hover:text-yellow-300">Home</a></li>
      <li><a href="browse.html" class="block hover:text-yellow-300">Browse</a></li>
      <li><a href="categories.html" class="block hover:text-yellow-300">Categories</a></li>
      <li><a href="fav.html" class="block hover:text-yellow-300">Favorites</a></li>
    </ul>
  </div>
</nav>

<!-- Hero -->
<section class="relative h-[500px] flex items-center justify-center text-white">

  <div class="absolute inset-0">
    <img 
      src="https://images.unsplash.com/photo-1512820790803-83ca734da794"
      alt="Books Background"
      class="w-full h-full object-cover">
  </div>

  <div class="absolute inset-0 bg-green-900 bg-opacity-70"></div>

  <div class="relative z-10 text-center px-4">
    <h2 class="text-4xl md:text-5xl font-bold mb-4"> Book Explorer </h2>
    <p class="text-lg mb-6"> YOUR GATEWAY TO LITERARY ADVENTURES </p>
    <a href="browse.html"class="bg-white text-green-700 px-6 py-3 rounded-lg font-semibold hover:bg-green-100 transition"> Browse Books </a>
  </div>

</section>

<!-- Books Section -->
<main class="flex-grow">
  <section class="max-w-7xl mx-auto px-4 py-16">
    <h3 class="text-2xl font-bold mb-8 text-center text-green-800">
      Popular Books
    </h3>

    <!-- Dynamic Grid -->
    <div id="bookGrid"
         class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
    </div>
  </section>
</main>

<!-- Footer -->
<footer class="bg-green-900 text-white py-6 text-center">
  BY CYNTHY
  <p>&copy; 2026 Book Explorer</p>
</footer>

<script>
  const menuBtn = document.getElementById("menuBtn");
  const mobileMenu = document.getElementById("mobileMenu");

  menuBtn.addEventListener("click", () => {
    mobileMenu.classList.toggle("hidden");
  });
</script>

<script type="module" src="scripts/index.js"></script>

</body>
</html>
